    async function deleteReview(id) {
      requireAdmin();
      if (!confirm("حذف التقييم؟")) return;
      await deleteDoc(doc(db, "reviews", id));
      showToast("تم حذف التقييم.");
    }

    async function sendSurvey(data, form) {
      if (!db) throw new Error("الخدمة غير متاحة حاليًا.");
      const payload = {
        name: String(data.name || "").trim(),
        question: String(data.question || "").trim(),
        rating: Number(data.rating || 5),
        comment: String(data.comment || "").trim(),
        source: "site-survey-form",
        createdAt: serverTimestamp()
      };
      await addDoc(collection(db, "surveys"), payload);
      form.reset();
      showToast("تم إرسال الرد.");
    }

    async function deleteSurvey(id) {
      requireAdmin();
      if (!confirm("حذف رد السيرفاي؟")) return;
      await deleteDoc(doc(db, "surveys", id));
      showToast("تم حذف رد السيرفاي.");
    }

    async function markMessageRead(id) {
      requireAdmin();
      await updateDoc(doc(db, "messages", id), { read: true, readAt: serverTimestamp() });
    }

    async function deleteMessage(id) {
      requireAdmin();
      if (!confirm("حذف الرسالة؟")) return;
      await deleteDoc(doc(db, "messages", id));
      showToast("تم حذف الرسالة.");
    }

    async function uploadImage(file) {
      if (!file) throw new Error("اختار صورة الأول.");
      showToast("جاري رفع الصورة...");
      const form = new FormData();
      form.append("image", file);
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMAGE_API_KEY}`, {
        method: "POST",
        body: form
      });
      const data = await res.json();
      if (!res.ok || !data?.data?.url) {
        throw new Error(data?.error?.message || "فشل رفع الصورة على API الصور.");
      }
      showToast("تم رفع الصورة.");
      return data.data.url;
    }

    function cleanSection(section) {
      return {
        id: section.id || uniqueId("section"),
        type: section.type || "text",
        title: section.title || "",
        text: section.text || "",
        eyebrow: section.eyebrow || "",
        imageUrl: section.imageUrl || "",
        layout: section.layout || "normal",
        actionText: section.actionText || "",
        actionPageId: section.actionPageId || "",
        secondaryText: section.secondaryText || "",
        note: section.note || "",
        items: ensureItems(section.items).map((item) => ({
          title: item.title || "",
          text: item.text || "",
          imageUrl: item.imageUrl || "",
          coverUrl: item.coverUrl || "",
          insideUrl: item.insideUrl || "",
          shape: item.shape || "rectangle"
        }))
      };
    }

    function createBlankSection(type = "image") {
      return {
        id: uniqueId("section"),
        type,
        title: "",
        text: "",
        eyebrow: "",
        imageUrl: "",
        layout: "normal",
        items: defaultItemsForType(type)
      };
    }

    function defaultItemsForType(type) {
      if (sectionUsesItems(type)) return [blankItemForType(type)];
      return [];
    }

    function sectionUsesItems(type) {
      return ["cards", "gallery", "accordion", "features"].includes(type);
    }

    function blankItemForType(type) {
      if (type === "features") return { title: "", text: "", imageUrl: "", shape: "rectangle" };
      if (type === "cards") return { title: "", text: "", imageUrl: "", coverUrl: "", insideUrl: "", shape: "rectangle" };
      return { title: "", text: "", imageUrl: "", shape: "rectangle" };
    }

    function sectionHasPublicContent(section) {
      const hasMain = Boolean(
        hasMeaningfulText(section.title)
        || hasMeaningfulText(section.text)
        || hasMeaningfulText(section.eyebrow)
        || hasMeaningfulText(section.note)
        || (section.imageUrl || "").trim()
      );
      if (["hero", "image", "text"].includes(section.type)) return hasMain;
      if (["reviews", "survey"].includes(section.type)) return true;
      return ensureItems(section.items).some(itemHasPublicContent);
    }

    function hasMeaningfulText(value) {
      const text = String(value || "").trim();
      if (!text) return false;
      const normalized = text.replace(/\s+\d+$/g, "");
      return !["عنصر جديد", "تاب جديد", "تاب فرعي جديد", "سيكشن جديد"].includes(normalized);
    }

    function updatePreviewImage(id, value, fallbackTitle) {
      const img = document.getElementById(id);
      if (!img) return;
      const url = String(value || "").trim();
      img.src = url || visual(fallbackTitle || "صورة");
    }

    function previewLocalFile(id, file) {
      const img = document.getElementById(id);
      if (!img || !file) return;
      img.src = URL.createObjectURL(file);
    }

    function requireAdmin() {
      if (!state.user) throw new Error("لازم تسجل دخول كأدمن.");
      if (!db) throw new Error("الخدمة غير متاحة حاليًا.");
    }

    function topLevelPages() {
      return state.pages
        .filter((page) => !page.parentId)
        .sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
    }

    function childPages(parentId) {
      return state.pages
        .filter((page) => page.parentId === parentId)
        .sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
    }

    function findPage(id) {
      return state.pages.find((page) => page.id === id);
    }

    function canDeletePage(pageId) {
      return !["home", "contact", "reviews"].includes(pageId);
    }

    function getCurrentPageId() {
      if (!state.currentRoute.startsWith("page/")) return "";
      const encoded = state.currentRoute.slice("page/".length) || "home";
      try {
        return decodeURIComponent(encoded);
      } catch (error) {
        return encoded;
      }
    }

    function pageHash(pageId) {
      return `#page/${encodeURIComponent(pageId)}`;
    }

    function ensureItems(value) {
      return Array.isArray(value) ? value : [];
    }

    function visibleSectionItems(value) {
      const items = ensureItems(value);
      return state.user ? items : items.filter(itemHasPublicContent);
    }

    function itemHasPublicContent(item) {
      return Boolean(
        hasMeaningfulText(item.title)
        || hasMeaningfulText(item.text)
        || (item.imageUrl || "").trim()
        || (item.coverUrl || "").trim()
        || (item.insideUrl || "").trim()
      );
    }

    function itemPreviewId(field, index) {
      if (field === "coverUrl") return `itemCoverPreview-${index}`;
      if (field === "insideUrl") return `itemInsidePreview-${index}`;
      return `itemImagePreview-${index}`;
    }

    function sectionTypes() {
      return [
        { value: "image", label: "صورة", icon: "image" },
        { value: "gallery", label: "جاليري", icon: "gallery-horizontal" },
        { value: "cards", label: "كروت", icon: "layout-grid" },
        { value: "text", label: "نص", icon: "file-text" },
        { value: "accordion", label: "عناوين", icon: "list-collapse" },
        { value: "hero", label: "هيرو", icon: "panel-top" },
        { value: "features", label: "مميزات", icon: "badge-check" },
        { value: "reviews", label: "تقييمات", icon: "star" },
        { value: "survey", label: "سيرفاي", icon: "clipboard-check" }
      ];
    }

    function sectionTypeMeta(type) {
      return sectionTypes().find((item) => item.value === type) || sectionTypes()[0];
    }

    function fontOptions() {
      return [
        { label: "Segoe UI", value: "Segoe UI, Tahoma, Arial, sans-serif" },
        { label: "Tahoma", value: "Tahoma, Arial, sans-serif" },
        { label: "Arial", value: "Arial, sans-serif" },
        { label: "Trebuchet", value: "Trebuchet MS, Arial, sans-serif" },
        { label: "Georgia", value: "Georgia, serif" }
      ];
    }

    function slugify(text) {
      const normalized = arabicNormalize(text || "page").replace(/[^a-z0-9\u0621-\u064a]+/gi, "-").replace(/^-|-$/g, "");
      return normalized || "page";
    }

    function uniqueId(prefix) {
      return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;
    }

    function whatsappUrl() {
      const raw = String(state.settings.whatsapp || defaultSettings.whatsapp).replace(/\D/g, "");
      const egypt = raw.startsWith("20") ? raw : raw.startsWith("0") ? `20${raw.slice(1)}` : `20${raw}`;
      return `https://wa.me/${egypt}`;
    }

    function renderSearchResults() {
      const root = document.getElementById("searchResults");
      if (!root) return;
      const queryText = state.searchQuery.trim();
      if (!queryText) {
        root.classList.remove("open");
        root.innerHTML = "";
        return;
      }
      const results = searchSite(queryText).slice(0, 8);
      root.classList.add("open");
      root.innerHTML = results.length ? results.map((result) => `
        <a class="search-result" href="${pageHash(result.pageId)}">
          <strong>${escapeHtml(result.title)}</strong>
          <span>${escapeHtml(result.excerpt)}</span>
        </a>
      `).join("") : `
        <div class="search-result">
          <strong>مفيش نتيجة واضحة</strong>
          <span>جرب كلمة قريبة أو بدون همزات.</span>
        </div>
      `;
    }

    function searchSite(queryText) {
      const queryNorm = arabicNormalize(queryText);
      const tokens = queryNorm.split(" ").filter(Boolean);
      const hay = [];
      state.pages.forEach((page) => {
        const pageText = [page.title, page.slug].join(" ");
        hay.push({
          pageId: page.id,
          title: page.title,
          excerpt: "صفحة / تاب",
          text: pageText
        });
        ensureItems(page.sections).forEach((section) => {
          hay.push({
            pageId: page.id,
            title: section.title || page.title,
            excerpt: [section.text, ...ensureItems(section.items).map((item) => `${item.title} ${item.text}`)].join(" ").slice(0, 150),
            text: [page.title, section.title, section.text, ...ensureItems(section.items).map((item) => `${item.title} ${item.text}`)].join(" ")
          });
        });
      });
      return hay
        .map((item) => {
          const textNorm = arabicNormalize(item.text);
          let score = textNorm.includes(queryNorm) ? 100 : 0;
          score += tokens.filter((token) => textNorm.includes(token)).length * 20;
          if (!score) {
            const words = textNorm.split(" ").filter(Boolean);
            score = tokens.reduce((sum, token) => {
              const best = Math.max(0, ...words.map((word) => similarity(token, word)));
              return sum + best;
            }, 0);
          }
          return { ...item, score };
        })
        .filter((item) => item.score > 0.42 || item.score >= 20)
        .sort((a, b) => b.score - a.score);
    }

    function arabicNormalize(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u064b-\u065f\u0670]/g, "")
        .replace(/[أإآٱ]/g, "ا")
        .replace(/ة/g, "ه")
        .replace(/ى/g, "ي")
        .replace(/[ؤئء]/g, "")
        .replace(/[^\u0621-\u064aa-z0-9\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function similarity(a, b) {
      if (!a || !b) return 0;
      if (b.includes(a) || a.includes(b)) return 0.8;
      const distance = levenshtein(a, b);
      return 1 - distance / Math.max(a.length, b.length);
    }

    function levenshtein(a, b) {
      const matrix = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
      for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
      for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          matrix[i][j] = Math.min(
            matrix[i - 1][j] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
          );
        }
      }
      return matrix[a.length][b.length];
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function refreshIcons() {
      if (window.lucide?.createIcons) {
        window.lucide.createIcons({ attrs: { width: 20, height: 20, "stroke-width": 2.2 } });
      }
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove("show"), 3200);
    }
  </script>
