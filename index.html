<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>حسام للطباعة والدعاية</title>
  <meta name="description" content="موقع أعمال وخدمات لمطبعة حسام." />
  <script defer src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg: #eef3f8;
      --surface: rgba(255, 255, 255, 0.76);
      --surface-strong: #ffffff;
      --text: #193345;
      --muted: #64717c;
      --primary: #236f98;
      --primary-strong: #155a7d;
      --accent: #d2a76c;
      --accent-strong: #b98b4f;
      --coral: #d84f4f;
      --teal: #44b8bd;
      --line: rgba(31, 62, 82, 0.14);
      --shadow: 0 18px 45px rgba(33, 55, 72, 0.14);
      --radius: 8px;
      --font: "Segoe UI", Tahoma, Arial, sans-serif;
      --text-scale: 1;
      --header-h: 76px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 12%, rgba(68, 184, 189, 0.14), transparent 28%),
        radial-gradient(circle at 86% 8%, rgba(210, 167, 108, 0.18), transparent 26%),
        linear-gradient(180deg, color-mix(in srgb, var(--bg) 92%, #ffffff 8%), var(--bg));
      font-family: var(--font);
      font-size: calc(16px * var(--text-scale));
      overflow-x: hidden;
    }

    body.dark {
      --bg: #121a21;
      --surface: rgba(25, 40, 51, 0.72);
      --surface-strong: #192833;
      --text: #edf6fb;
      --muted: #aab9c4;
      --line: rgba(255, 255, 255, 0.14);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.32);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .app-shell {
      min-height: 100vh;
    }

    .glass {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 80;
      min-height: var(--header-h);
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-strong) 78%, transparent);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .header-inner {
      width: min(1180px, calc(100% - 32px));
      min-height: var(--header-h);
      margin: 0 auto;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 14px;
      padding: 8px 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      order: 1;
      flex: 0 0 auto;
      min-width: 220px;
      max-width: 280px;
      justify-content: flex-start;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      font-weight: 900;
      letter-spacing: 0;
      overflow: hidden;
      background:
        linear-gradient(135deg, var(--primary), var(--teal)),
        linear-gradient(45deg, transparent 38%, rgba(255, 255, 255, 0.32) 38% 48%, transparent 48%);
      box-shadow: 0 10px 26px rgba(31, 111, 152, 0.22);
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-copy {
      min-width: 0;
      line-height: 1.15;
    }

    .brand-title {
      display: block;
      max-width: 185px;
      color: var(--primary);
      font-size: 1.04rem;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-tagline {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .main-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1 1 520px;
      order: 2;
      flex-wrap: wrap;
      gap: 4px;
      row-gap: 6px;
      min-width: 280px;
    }

    .nav-item {
      position: relative;
    }

    .nav-link,
    .tool-btn,
    .icon-btn {
      border: 0;
      color: var(--text);
      background: transparent;
    }

    .nav-link {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 42px;
      padding: 0 12px;
      border-radius: var(--radius);
      font-size: 0.93rem;
      font-weight: 750;
      white-space: nowrap;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 10%, transparent);
    }

    .nav-link.active::after {
      content: "";
      position: absolute;
      right: 16px;
      left: 16px;
      bottom: 2px;
      height: 3px;
      border-radius: 3px;
      background: var(--accent);
    }

    .subnav {
      position: absolute;
      top: 100%;
      right: 50%;
      min-width: 240px;
      padding: 16px 10px 10px;
      opacity: 0;
      pointer-events: none;
      transform: translateX(50%) translateY(-8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      border-radius: 8px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .subnav::before {
      content: "";
      position: absolute;
      top: 6px;
      right: calc(50% - 8px);
      width: 14px;
      height: 14px;
      border-top: 1px solid var(--line);
      border-right: 1px solid var(--line);
      background: var(--surface-strong);
      transform: rotate(-45deg);
    }

    .nav-tab-wrap {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      position: relative;
    }

    .nav-edit-mini,
    .subnav-edit-mini,
    .nav-delete-mini,
    .subnav-delete-mini {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      color: var(--primary);
      background: color-mix(in srgb, var(--surface-strong) 82%, transparent);
    }

    .nav-edit-mini:hover,
    .subnav-edit-mini:hover {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .nav-delete-mini:hover,
    .subnav-delete-mini:hover {
      color: #fff;
      background: var(--coral);
      border-color: var(--coral);
    }

    .subnav-row {
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--line);
    }

    .subnav-row:last-of-type {
      border-bottom: 0;
    }

    .nav-item:hover .subnav,
    .nav-item:focus-within .subnav,
    .nav-item.subnav-pinned .subnav {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(50%) translateY(0);
    }

    .nav-item.subnav-pinned > .nav-tab-wrap .nav-link {
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 10%, transparent);
    }

    .nav-item[draggable="true"],
    .subnav-row[draggable="true"] {
      cursor: grab;
      user-select: none;
    }

    .nav-item.dragging,
    .subnav-row.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .nav-item.drag-over > .nav-tab-wrap,
    .subnav-row.drag-over {
      outline: 2px dashed var(--primary);
      outline-offset: 3px;
      background: color-mix(in srgb, var(--primary) 8%, transparent);
      border-radius: var(--radius);
    }

    .subnav a {
      display: block;
      flex: 1;
      padding: 12px 14px;
      color: var(--muted);
      font-weight: 650;
    }

    .subnav a:last-child {
      border-bottom: 0;
    }

    .subnav a:hover {
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 7%, transparent);
    }

    .nav-quick-add,
    .subnav-add {
      display: inline-grid;
      place-items: center;
      border: 1px dashed color-mix(in srgb, var(--primary) 42%, var(--line));
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 8%, transparent);
    }

    .nav-quick-add {
      width: 42px;
      min-width: 42px;
      height: 42px;
      padding: 0;
      border-radius: var(--radius);
    }

    .subnav-add {
      width: 100%;
      height: 42px;
      margin-top: 8px;
      border-radius: var(--radius);
    }

    .subnav-add:hover,
    .nav-quick-add:hover {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .header-tools {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      order: 3;
      flex: 0 0 auto;
      min-width: 0;
      justify-content: flex-end;
    }

    .search-wrap {
      position: relative;
      width: min(190px, 20vw);
    }

    .search-input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: color-mix(in srgb, var(--surface-strong) 82%, transparent);
      padding: 0 42px 0 12px;
      outline: none;
    }

    .search-input:focus {
      border-color: color-mix(in srgb, var(--primary) 55%, var(--line));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 13%, transparent);
    }

    .search-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 20px;
      height: 20px;
      pointer-events: none;
    }

    .search-results {
      position: absolute;
      z-index: 100;
      top: calc(100% + 10px);
      left: 0;
      width: min(420px, calc(100vw - 32px));
      max-height: 420px;
      overflow: auto;
      padding: 8px;
      border-radius: 8px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      display: none;
    }

    .search-results.open {
      display: block;
    }

    .search-result {
      display: block;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid transparent;
    }

    .search-result:hover {
      border-color: var(--line);
      background: color-mix(in srgb, var(--primary) 7%, transparent);
    }

    .search-result strong {
      display: block;
      margin-bottom: 4px;
      color: var(--primary);
    }

    .search-result span {
      display: block;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.6;
    }

    .tool-btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: var(--radius);
      font-weight: 800;
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 24px rgba(31, 111, 152, 0.22);
    }

    .tool-btn.secondary {
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 10%, transparent);
      box-shadow: none;
    }

    .tool-btn.accent {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 10px 24px rgba(210, 167, 108, 0.26);
    }

    .tool-btn.ghost {
      color: var(--text);
      background: transparent;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .login-icon-btn {
      width: 46px;
      min-width: 46px;
      padding: 0;
    }

    .login-icon-btn .btn-text {
      display: none;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: inline-grid;
      place-items: center;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-strong) 78%, transparent);
    }

    .icon-btn:hover {
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 8%, transparent);
    }

    .mobile-menu-btn {
      display: none;
    }

    .hero {
      position: relative;
      isolation: isolate;
      min-height: min(680px, calc(100vh - var(--header-h)));
      display: grid;
      align-items: center;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.24)),
        linear-gradient(180deg, color-mix(in srgb, var(--primary) 8%, transparent), transparent 52%),
        var(--bg);
    }

    body.dark .hero {
      background:
        linear-gradient(90deg, rgba(18, 26, 33, 0.7), rgba(18, 26, 33, 0.24)),
        linear-gradient(180deg, color-mix(in srgb, var(--primary) 16%, transparent), transparent 52%),
        var(--bg);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      opacity: 0.55;
      background:
        linear-gradient(168deg, transparent 0 24%, rgba(35, 111, 152, 0.12) 24% 35%, transparent 35% 100%),
        linear-gradient(14deg, transparent 0 61%, rgba(210, 167, 108, 0.14) 61% 70%, transparent 70% 100%);
    }

    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(330px, 0.94fr) minmax(360px, 1.06fr);
      gap: 36px;
      align-items: center;
      padding: 58px 0 84px;
    }

    .hero-copy {
      max-width: 650px;
      justify-self: end;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: var(--radius);
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 10%, transparent);
      font-weight: 850;
      font-size: 0.88rem;
    }

    .hero h1 {
      margin: 20px 0 14px;
      color: var(--primary);
      font-size: clamp(2.2rem, 5.2vw, 4.7rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .hero p {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.04rem, 1.6vw, 1.35rem);
      line-height: 1.9;
    }

    .hero-note {
      margin-top: 22px;
      padding: 18px 20px;
      color: var(--muted);
      border-radius: 8px;
      background: color-mix(in srgb, var(--surface-strong) 72%, transparent);
      border: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 26px;
    }

    .hero-art {
      position: relative;
      min-height: 430px;
      display: grid;
      place-items: center;
    }

    .hero-image,
    .visual-print {
      width: min(100%, 560px);
      aspect-ratio: 1.3;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: linear-gradient(135deg, #f9fbfd, #dbe9f2);
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .visual-print {
      position: relative;
      isolation: isolate;
      transform: rotate(-2deg);
    }

    .visual-print::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.75), transparent 40%),
        linear-gradient(30deg, rgba(35, 111, 152, 0.18), transparent 50%),
        radial-gradient(circle at 72% 22%, rgba(210, 167, 108, 0.38), transparent 24%);
    }

    .print-stack {
      position: absolute;
      width: 58%;
      height: 62%;
      left: 12%;
      bottom: 12%;
      transform: rotate(7deg);
    }

    .print-sheet {
      position: absolute;
      inset: auto;
      border-radius: 7px;
      box-shadow: 0 14px 28px rgba(20, 40, 55, 0.18);
      background: #fff;
      overflow: hidden;
    }

    .print-sheet.one {
      width: 70%;
      height: 58%;
      left: 11%;
      bottom: 0;
      background:
        linear-gradient(135deg, #fff 0 36%, #f4d1d1 36% 60%, #fff 60%),
        linear-gradient(90deg, var(--primary), var(--accent));
    }

    .print-sheet.two {
      width: 72%;
      height: 58%;
      left: 0;
      bottom: 20%;
      transform: rotate(-8deg);
      background:
        linear-gradient(135deg, #ffffff 0 42%, color-mix(in srgb, var(--teal) 48%, #fff) 42% 64%, #ffffff 64%),
        linear-gradient(90deg, var(--primary), var(--accent));
    }

    .print-sheet.three {
      width: 76%;
      height: 58%;
      right: 0;
      bottom: 36%;
      transform: rotate(11deg);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--primary) 72%, #111) 0 45%, #fff 45% 62%, var(--accent) 62%),
        linear-gradient(90deg, #fff, #e9f5f8);
    }

    .stamp {
      position: absolute;
      top: 18%;
      right: 14%;
      width: 88px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      font-weight: 900;
      background: var(--primary);
      border: 8px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 10px 24px rgba(35, 111, 152, 0.25);
    }

    .hero-chip {
      position: absolute;
      z-index: 2;
      right: 2%;
      bottom: 8%;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      font-weight: 850;
      color: var(--primary);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.62);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .content-section {
      position: relative;
      padding: 66px 0;
    }

    .section-heading {
      max-width: 840px;
      margin: 0 auto 34px;
      text-align: center;
    }

    .section-heading h2 {
      margin: 0;
      color: var(--primary);
      font-size: clamp(1.7rem, 3vw, 2.65rem);
      line-height: 1.25;
    }

    .section-heading h2 .accent-word {
      color: var(--accent);
    }

    .section-heading p {
      margin: 12px auto 0;
      color: var(--muted);
      line-height: 1.9;
      font-size: 1.02rem;
    }

    .section-heading .decor {
      width: 128px;
      height: 4px;
      margin: 16px auto 0;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--accent), var(--primary));
    }

    .feature-strip {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin-top: -54px;
      padding: 20px;
      border-radius: 8px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .feature-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 72px;
      padding: 8px;
      border-left: 1px solid var(--line);
    }

    .feature-item:last-child {
      border-left: 0;
    }

    .feature-icon {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 10%, transparent);
      outline: 4px solid color-mix(in srgb, var(--accent) 32%, transparent);
      flex: 0 0 auto;
    }

    .feature-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .feature-item strong {
      display: block;
      color: var(--primary);
      font-size: 1.05rem;
    }

    .feature-item span {
      display: block;
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 2px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px;
    }

    .work-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .content-card,
    .work-card,
    .message-card,
    .builder-card {
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface-strong) 88%, transparent);
      border: 1px solid var(--line);
      box-shadow: 0 14px 36px rgba(33, 55, 72, 0.08);
      overflow: hidden;
    }

    .content-card {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .content-card:hover,
    .work-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .card-media {
      position: relative;
      aspect-ratio: 1.35;
      overflow: hidden;
      background: color-mix(in srgb, var(--primary) 8%, #fff);
    }

    .card-media .inner-thumb {
      position: absolute;
      left: 12px;
      bottom: 12px;
      width: 78px;
      height: 58px;
      border-radius: 8px;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 24px rgba(18, 38, 52, 0.2);
      background: #fff;
    }

    .card-media.square {
      aspect-ratio: 1;
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 0 0 8px 8px;
      transition: transform 0.22s ease;
    }

    .content-card:hover .card-media img,
    .work-card:hover img {
      transform: scale(1.035);
    }

    .add-card-tile {
      min-height: 250px;
      display: grid;
      place-items: center;
      gap: 10px;
      border: 1px dashed color-mix(in srgb, var(--primary) 45%, var(--line));
      border-radius: var(--radius);
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 7%, var(--surface-strong));
      font-weight: 850;
    }

    .add-card-tile i {
      width: 30px;
      height: 30px;
    }

    .add-card-tile:hover {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .card-body {
      padding: 22px;
      display: flex;
      flex: 1;
      flex-direction: column;
      align-items: flex-start;
    }

    .card-body h3,
    .split-copy h2 {
      margin: 0 0 12px;
      color: var(--primary);
      line-height: 1.3;
    }

    .card-body p,
    .split-copy p,
    .text-body {
      margin: 0;
      color: var(--muted);
      line-height: 1.9;
    }

    .reviews-panel,
    .survey-panel {
      display: grid;
      grid-template-columns: minmax(300px, 0.85fr) minmax(320px, 1.15fr);
      gap: 18px;
      align-items: start;
    }

    .review-form,
    .survey-form,
    .reviews-list {
      border-radius: 8px;
      padding: 20px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-strong) 84%, transparent);
      box-shadow: 0 14px 36px rgba(33, 55, 72, 0.08);
    }

    .rating-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      direction: ltr;
      justify-content: center;
      align-items: end;
      padding: 8px 0 2px;
    }

    .rating-option {
      cursor: pointer;
      color: var(--muted);
    }

    .rating-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .rating-option span {
      display: grid;
      justify-items: center;
      gap: 4px;
      min-width: 42px;
      border: 0;
      background: transparent;
    }

    .rating-option small {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 850;
    }

    .rating-option i,
    .stars-display i {
      color: color-mix(in srgb, var(--accent) 26%, var(--muted));
      font-style: normal;
      line-height: 1;
      text-shadow: 0 5px 16px rgba(210, 167, 108, 0.18);
      transition: color 0.16s ease, transform 0.16s ease, text-shadow 0.16s ease;
    }

    .rating-option i {
      font-size: 2.25rem;
    }

    .rating-row:hover .rating-option i {
      color: color-mix(in srgb, var(--accent) 18%, var(--muted));
      transform: none;
    }

    .rating-row .rating-option:has(input:checked) i,
    .rating-row .rating-option:has(input:checked) ~ .rating-option i,
    .rating-row .rating-option:hover i,
    .rating-row .rating-option:hover ~ .rating-option i {
      color: #ffc400;
      transform: translateY(-2px) scale(1.08);
      text-shadow: 0 8px 20px rgba(255, 196, 0, 0.34);
    }

    .rating-row .rating-option:has(input:checked) small,
    .rating-row .rating-option:has(input:checked) ~ .rating-option small,
    .rating-row .rating-option:hover small,
    .rating-row .rating-option:hover ~ .rating-option small {
      color: var(--accent-strong);
    }

    .reviews-list {
      display: grid;
      gap: 12px;
    }

    .review-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface-strong) 90%, transparent);
    }

    .review-card strong {
      display: block;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .review-stars {
      color: var(--accent-strong);
      font-weight: 900;
      letter-spacing: 0;
    }

    .stars-display {
      display: inline-flex;
      direction: ltr;
      gap: 3px;
      margin: 4px 0;
    }

    .stars-display i {
      font-size: 1.18rem;
    }

    .stars-display i.lit {
      color: #ffc400;
      text-shadow: 0 5px 14px rgba(255, 196, 0, 0.32);
    }

    .review-delete-btn {
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      color: #ff4f7b;
      background: color-mix(in srgb, #ff4f7b 12%, transparent);
      border-color: color-mix(in srgb, #ff4f7b 24%, var(--line));
    }

    .survey-responses {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .survey-response {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface-strong) 90%, transparent);
    }

    .platform-settings-panel {
      max-width: 780px;
      margin-inline: auto;
    }

    .card-body .tool-btn {
      margin-top: auto;
      padding-inline: 18px;
    }

    .split-layout {
      display: grid;
      grid-template-columns: minmax(320px, 0.95fr) minmax(320px, 1.05fr);
      gap: 28px;
      align-items: center;
    }

    .split-layout.flip {
      grid-template-columns: minmax(320px, 1.05fr) minmax(320px, 0.95fr);
    }

    .split-media {
      position: relative;
      min-height: 340px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      background: color-mix(in srgb, var(--primary) 10%, #fff);
    }

    .split-media img {
      width: 100%;
      height: 100%;
      min-height: 340px;
      object-fit: cover;
    }

    .split-media.image-only {
      max-width: 980px;
      min-height: min(560px, 70vh);
      margin: 0 auto;
    }

    .split-copy {
      padding: 28px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--surface-strong) 76%, transparent);
      border: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }

    .split-copy h2 {
      font-size: clamp(1.55rem, 2.6vw, 2.5rem);
    }

    .text-panel {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--surface-strong) 78%, transparent);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .text-panel h2 {
      margin: 0 0 12px;
      color: var(--primary);
    }

    .work-card {
      position: relative;
      aspect-ratio: 1.36;
      cursor: pointer;
    }

    .work-card.square {
      aspect-ratio: 1;
    }

    .work-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .work-card-caption {
      position: absolute;
      inset: auto 10px 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      color: #fff;
      background: rgba(18, 33, 43, 0.64);
      backdrop-filter: blur(12px);
    }

    .accordion-list {
      display: grid;
      grid-template-columns: minmax(280px, 0.9fr) minmax(320px, 1.1fr);
      gap: 22px;
      align-items: stretch;
    }

    .accordion-tabs {
      display: grid;
      gap: 10px;
    }

    .accordion-tab {
      width: 100%;
      min-height: 58px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--surface-strong);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 850;
      text-align: start;
    }

    .accordion-tab.active {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .accordion-preview {
      min-height: 390px;
      padding: 18px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-strong) 82%, transparent);
      box-shadow: var(--shadow);
    }

    .accordion-preview img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .accordion-preview h3 {
      margin: 0 0 8px;
      color: var(--primary);
    }

    .accordion-preview p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .admin-toolbar {
      position: sticky;
      z-index: 60;
      top: var(--header-h);
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-strong) 82%, transparent);
      backdrop-filter: blur(16px);
    }

    .admin-toolbar-inner {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .admin-tabs {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .admin-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      color: var(--text);
      background: transparent;
      font-weight: 800;
    }

    .admin-pill.active,
    .admin-pill:hover {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .badge {
      display: inline-grid;
      place-items: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 22px;
      color: #fff;
      background: var(--coral);
      font-size: 0.76rem;
      font-weight: 900;
    }

    .section-admin-tools {
      position: absolute;
      z-index: 5;
      top: 16px;
      left: calc((100vw - min(1180px, calc(100vw - 32px))) / 2);
      display: flex;
      gap: 8px;
      padding: 8px;
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface-strong) 90%, transparent);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .empty-public {
      min-height: calc(100vh - var(--header-h));
    }

    .empty-admin {
      min-height: 420px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 48px 16px;
    }

    .empty-admin .box {
      max-width: 520px;
      padding: 28px;
      border-radius: 8px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .section-palette {
      padding: 18px 0 8px;
    }

    .section-palette-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .section-choice {
      min-height: 96px;
      display: grid;
      place-items: center;
      gap: 8px;
      padding: 12px 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: color-mix(in srgb, var(--surface-strong) 84%, transparent);
      box-shadow: 0 10px 24px rgba(33, 55, 72, 0.08);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .section-choice:hover {
      transform: translateY(-3px);
      border-color: color-mix(in srgb, var(--primary) 45%, var(--line));
      background: color-mix(in srgb, var(--primary) 7%, var(--surface-strong));
    }

    .section-choice i {
      color: var(--primary);
      width: 28px;
      height: 28px;
    }

    .section-choice span {
      font-size: 0.88rem;
      font-weight: 850;
      text-align: center;
      line-height: 1.35;
    }

    .editor-shell {
      padding: 34px 0 70px;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 22px;
      align-items: start;
    }

    .panel {
      border-radius: 8px;
      padding: 20px;
      background: color-mix(in srgb, var(--surface-strong) 88%, transparent);
      border: 1px solid var(--line);
      box-shadow: 0 14px 36px rgba(33, 55, 72, 0.08);
    }

    .panel h2,
    .panel h3 {
      margin: 0 0 16px;
      color: var(--primary);
      line-height: 1.3;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--text);
      font-weight: 800;
      font-size: 0.88rem;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: color-mix(in srgb, var(--surface-strong) 92%, transparent);
      padding: 10px 12px;
      outline: none;
    }

    .field textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.7;
    }

    .field input[type="color"] {
      height: 42px;
      padding: 3px;
    }

    .field input[type="range"] {
      padding: 0;
      min-height: auto;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: color-mix(in srgb, var(--primary) 55%, var(--line));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 12%, transparent);
    }

    .two-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .page-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
      max-height: 430px;
      overflow: auto;
      padding-left: 4px;
    }

    .page-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface-strong) 78%, transparent);
    }

    .page-row small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
    }

    .page-row-actions {
      display: flex;
      gap: 6px;
    }

    .builder-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .builder-list {
      display: grid;
      gap: 12px;
    }

    .builder-card {
      padding: 14px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .section-type-badge {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 10%, transparent);
      border: 1px solid var(--line);
    }

    .builder-card h3 {
      margin: 0 0 4px;
      font-size: 1rem;
      color: var(--text);
    }

    .builder-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .messages-page {
      padding: 34px 0 70px;
    }

    .messages-grid {
      display: grid;
      gap: 14px;
    }

    .message-card {
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      border-right: 4px solid transparent;
    }

    .message-card.unread {
      border-right-color: var(--coral);
      background: color-mix(in srgb, var(--coral) 5%, var(--surface-strong));
    }

    .message-card h3 {
      margin: 0 0 8px;
      color: var(--primary);
    }

    .message-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 10px;
    }

    .message-card p {
      margin: 0;
      color: var(--text);
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .contact-page {
      padding: 50px 0 80px;
    }

    .contact-card {
      display: grid;
      grid-template-columns: minmax(320px, 0.84fr) minmax(320px, 1.16fr);
      gap: 0;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      background: var(--surface-strong);
    }

    .contact-visual {
      position: relative;
      min-height: 540px;
      padding: 28px;
      overflow: hidden;
      color: #fff;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--primary) 92%, #000), color-mix(in srgb, var(--teal) 60%, var(--primary))),
        var(--primary);
    }

    .contact-visual::after {
      content: "";
      position: absolute;
      inset: 34px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
    }

    .contact-visual h1 {
      position: relative;
      z-index: 1;
      margin: 0 0 14px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.15;
    }

    .contact-visual p {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 480px;
      line-height: 1.9;
      color: rgba(255, 255, 255, 0.84);
    }

    .contact-visual .mini-card {
      position: absolute;
      z-index: 1;
      right: 28px;
      bottom: 28px;
      left: 28px;
      padding: 18px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
    }

    .contact-form {
      padding: 28px;
      align-self: center;
    }

    .toast {
      position: fixed;
      z-index: 200;
      right: 22px;
      bottom: 22px;
      display: none;
      max-width: min(420px, calc(100% - 44px));
      padding: 14px 16px;
      border-radius: var(--radius);
      color: #fff;
      background: #203442;
      box-shadow: var(--shadow);
    }

    .toast.show {
      display: block;
      animation: toast-in 0.2s ease;
    }

    @keyframes toast-in {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .floating-contact {
      position: fixed;
      z-index: 90;
      right: 24px;
      bottom: 24px;
      width: 74px;
      height: 74px;
    }

    .contact-main {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      color: #fff;
      background: var(--primary);
      box-shadow: 0 16px 34px rgba(35, 111, 152, 0.3);
      transition: transform 0.22s ease, background 0.22s ease;
    }

    .floating-contact.open .contact-main {
      transform: rotate(45deg);
      background: var(--coral);
    }

    .contact-orbit {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .orbit-btn {
      position: absolute;
      right: 8px;
      bottom: 8px;
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      border: 0;
      box-shadow: var(--shadow);
      transform: translate(0, 0) scale(0.66);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .floating-contact.open .orbit-btn {
      opacity: 1;
      pointer-events: auto;
    }

    .floating-contact.open .orbit-btn.whatsapp {
      transform: translate(-6px, -116px) scale(1);
    }

    .floating-contact.open .orbit-btn.facebook {
      transform: translate(-82px, -86px) scale(1);
    }

    .floating-contact.open .orbit-btn.message {
      transform: translate(-118px, -10px) scale(1);
    }

    .orbit-btn.whatsapp { background: #54c247; }
    .orbit-btn.facebook { background: #2f63c7; }
    .orbit-btn.message { background: var(--accent); }

    .modal-backdrop {
      position: fixed;
      z-index: 150;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(11, 20, 28, 0.56);
      backdrop-filter: blur(8px);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(720px, 100%);
      max-height: min(90vh, 920px);
      overflow: auto;
      border-radius: 8px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.28);
    }

    .modal.wide {
      width: min(980px, 100%);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-strong);
    }

    .modal-head h2 {
      margin: 0;
      color: var(--primary);
    }

    .modal-body {
      padding: 20px;
    }

    .item-editor-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .item-editor {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface-strong) 84%, transparent);
    }

    .item-editor-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .image-preview-card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--primary) 7%, var(--surface-strong));
      min-height: 180px;
    }

    .image-preview-card.compact {
      min-height: 130px;
    }

    .image-preview-card img {
      width: 100%;
      height: 100%;
      min-height: inherit;
      object-fit: cover;
    }

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

    import {

    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAmYv_ZOIdNOThnxiIHTQegY7POlFjaFmc",
      authDomain: "hossam-38719.firebaseapp.com",

    };

    const IMAGE_API_KEY = "48bb17b6e24892d745741a65d54e3520";

    const fbApp = initializeApp(firebaseConfig);
    try {

      console.info("Analytics is skipped in this environment.", error);

    const auth = getAuth(fbApp);
    const db = getFirestoreSafe();

    setPersistence(auth, browserLocalPersistence).catch(() => {});

    function getFirestoreSafe() {
      try {
        return getFirestore(fbApp);

        console.error(error);
        return null;
      }
    }

    const defaultSettings = {
      title: "حسام للطباعة والدعاية",
      tagline: "طباعة، دعاية، وهوية بصرية",
      logoUrl: "",
      whatsapp: "01020676556",
      facebook: "https://www.facebook.com/HOSSAMEL3WITY",
      theme: "light",
      primary: "#236f98",
      accent: "#d2a76c",
      coral: "#d84f4f",
      teal: "#44b8bd",
      background: "#eef3f8",
      textColor: "#193345",
      fontFamily: "Segoe UI, Tahoma, Arial, sans-serif",
      textScale: 1
    };

    const visual = (title, bg1 = "#236f98", bg2 = "#d2a76c", bg3 = "#44b8bd") => {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620">
          <defs>
            <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
              <stop stop-color="${bg1}" offset="0"/>

            </linearGradient>
