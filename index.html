            <rect x="58" y="60" width="142" height="100" rx="10" fill="${bg1}" opacity=".92"/>
            <rect x="220" y="68" width="150" height="16" rx="8" fill="#d6e3ea"/>
            <rect x="220" y="102" width="118" height="16" rx="8" fill="#e6edf1"/>
            <rect x="58" y="188" width="310" height="20" rx="10" fill="${bg2}" opacity=".92"/>
          </g>
          <text x="450" y="548" text-anchor="middle" font-size="42" font-family="Arial, sans-serif" font-weight="700" fill="${bg1}">${title}</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    };

    const starterPages = [
      {
        id: "home",
        title: "الرئيسية",
        slug: "home",
        order: 0,
        parentId: "",
        sections: []
      },
      {
        id: "contact",
        title: "تواصل معنا",
        slug: "contact",
        order: 1,
        parentId: "",
        sections: []
      },
      {
        id: "reviews",
        title: "تقييمات العملاء",
        slug: "reviews",
        order: 2,
        parentId: "",
        sections: [
          {
            id: "reviews-main",
            type: "reviews",
            title: "تقييمات العملاء",
            text: "",
            items: []
          }
        ]
      }
    ];

    const oldStarterSectionIds = new Set([
      "hero-start",
      "features-start",
      "services-start",
      "gallery-start",
      "printing-hero",
      "printing-accordion",
      "identity-text",
      "portfolio-gallery"
    ]);
    const oldStarterOnlyPageIds = new Set(["printing", "identity", "portfolio"]);

    const state = {
      settings: { ...defaultSettings },
      pages: structuredClone(starterPages),
      usingStarter: true,
      user: null,
      messages: [],
      reviews: [],
      surveys: [],
      messageFilter: "all",
      currentRoute: "page/home",
      contactOpen: false,
      menuOpen: false,
      pinnedSubnavId: "",
      tabDrag: null,
      suppressNavClickUntil: 0,
      selectedEditorPageId: "home",
      modal: null,
      sectionDraft: null,
      sectionDraftIndex: null,
      sectionDraftPageId: null,
      searchQuery: "",
      activeAccordion: {},
      unsub: {
        settings: null,
        pages: null,
        messages: null,
        reviews: null,
        surveys: null
      }
    };

    const appRoot = document.getElementById("app");
    const modalRoot = document.getElementById("modal-root");
    const toastEl = document.getElementById("toast");

    onAuthStateChanged(auth, (user) => {
      state.user = user;
      if (user) {
        listenMessages();
        listenSurveys();
      } else if (state.unsub.messages) {
        state.unsub.messages();
        state.unsub.messages = null;
        state.messages = [];
      }
      if (!user && state.unsub.surveys) {
        state.unsub.surveys();
        state.unsub.surveys = null;
        state.surveys = [];
      }
      renderApp();
    });

    listenSettings();
    listenPages();
    listenReviews();
    setRouteFromHash();
    window.addEventListener("hashchange", () => {
      setRouteFromHash();
      renderApp();
    });

    document.addEventListener("click", handleClick);
    document.addEventListener("submit", handleSubmit);
    document.addEventListener("input", handleInput);
    document.addEventListener("change", handleChange);
    document.addEventListener("dragstart", handleTabDragStart);
    document.addEventListener("dragover", handleTabDragOver);
    document.addEventListener("dragleave", handleTabDragLeave);
    document.addEventListener("drop", handleTabDrop);
    document.addEventListener("dragend", handleTabDragEnd);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        state.modal = null;
        state.contactOpen = false;
        state.menuOpen = false;
        renderApp();
      }
    });

    function listenSettings() {
      if (!db) return;
      const ref = doc(db, "siteSettings", "main");
      state.unsub.settings = onSnapshot(ref, (snap) => {
        if (snap.exists()) {
          state.settings = { ...defaultSettings, ...snap.data() };
        }
        applySettings();
        renderApp();
      }, (error) => {
        console.warn("Settings listener failed", error);
        applySettings();
        renderApp();
      });
    }

    function listenPages() {
      if (!db) {
        renderApp();
        return;
      }
      const q = query(collection(db, "sitePages"), orderBy("order", "asc"));
      state.unsub.pages = onSnapshot(q, (snap) => {
        const pages = snap.docs
          .map((item) => ({ id: item.id, ...item.data() }))
          .map(sanitizeStoredPage)
          .filter(Boolean);
        if (pages.length) {
          state.pages = ensureBuiltInPages(pages.map((page) => ({ ...page, sections: Array.isArray(page.sections) ? page.sections : [] })));
          state.usingStarter = false;
          if (!state.pages.some((page) => page.id === state.selectedEditorPageId)) {
            state.selectedEditorPageId = topLevelPages()[0]?.id || state.pages[0]?.id || "";
          }
        } else {
          state.pages = structuredClone(starterPages);
          state.usingStarter = true;
        }
        renderApp();
      }, (error) => {
        console.warn("Pages listener failed", error);
        state.pages = structuredClone(starterPages);
        state.usingStarter = true;
        renderApp();
      });
    }

    function sanitizeStoredPage(page) {
      const sections = ensureItems(page.sections).filter((section) => !oldStarterSectionIds.has(section.id));
      if (oldStarterOnlyPageIds.has(page.id) && sections.length === 0) return null;
      return { ...page, sections };
    }

    function ensureBuiltInPages(pages) {
      const next = [...pages];
      const reviewTemplate = structuredClone(starterPages.find((page) => page.id === "reviews"));
      const reviewIndex = next.findIndex((page) => page.id === "reviews");
      if (reviewIndex === -1) {
        next.push(reviewTemplate);
      } else if (!ensureItems(next[reviewIndex].sections).some((section) => section.type === "reviews")) {
        next[reviewIndex] = {
          ...reviewTemplate,
          ...next[reviewIndex],
          sections: [...ensureItems(next[reviewIndex].sections), ...reviewTemplate.sections]
        };
      }
      return next;
    }

    function listenMessages() {
      if (!db || state.unsub.messages) return;
      const q = query(collection(db, "messages"), orderBy("createdAt", "desc"));
      state.unsub.messages = onSnapshot(q, (snap) => {
        state.messages = snap.docs.map((item) => ({ id: item.id, ...item.data() }));
        renderApp();
      }, (error) => {
        console.warn("Messages listener failed", error);
        showToast("مش قادر أقرأ الرسائل. راجع قواعد Firestore.");
      });
    }

    function listenReviews() {
      if (!db || state.unsub.reviews) return;
      const q = query(collection(db, "reviews"), orderBy("createdAt", "desc"));
      state.unsub.reviews = onSnapshot(q, (snap) => {
        state.reviews = snap.docs.map((item) => ({ id: item.id, ...item.data() }));
        renderApp();
      }, (error) => {
        console.warn("Reviews listener failed", error);
      });
    }

    function listenSurveys() {
      if (!db || state.unsub.surveys) return;
      const q = query(collection(db, "surveys"), orderBy("createdAt", "desc"));
      state.unsub.surveys = onSnapshot(q, (snap) => {
        state.surveys = snap.docs.map((item) => ({ id: item.id, ...item.data() }));
        renderApp();
      }, (error) => {
        console.warn("Surveys listener failed", error);
      });
    }

    function setRouteFromHash() {
      const raw = (location.hash || "#page/home").replace(/^#\/?/, "");
      state.currentRoute = raw || "page/home";
      state.contactOpen = false;
      state.menuOpen = false;
      if (raw === "contact") state.currentRoute = "contact";
    }

    function applySettings() {
      const s = state.settings;
      document.body.classList.toggle("dark", s.theme === "dark");
      document.documentElement.style.setProperty("--primary", s.primary || defaultSettings.primary);
      document.documentElement.style.setProperty("--primary-strong", colorMix(s.primary || defaultSettings.primary, "#000000", 0.22));
      document.documentElement.style.setProperty("--accent", s.accent || defaultSettings.accent);
      document.documentElement.style.setProperty("--accent-strong", colorMix(s.accent || defaultSettings.accent, "#000000", 0.18));
      document.documentElement.style.setProperty("--coral", s.coral || defaultSettings.coral);
      document.documentElement.style.setProperty("--teal", s.teal || defaultSettings.teal);
      document.documentElement.style.setProperty("--bg", s.background || defaultSettings.background);
      document.documentElement.style.setProperty("--text", s.textColor || defaultSettings.textColor);
      document.documentElement.style.setProperty("--font", s.fontFamily || defaultSettings.fontFamily);
      document.documentElement.style.setProperty("--text-scale", Number(s.textScale || 1));
      document.title = s.title || defaultSettings.title;
    }

    function colorMix(hex, mix, amount) {
      const a = hexToRgb(hex);
      const b = hexToRgb(mix);
      if (!a || !b) return hex;
      const c = {
        r: Math.round(a.r + (b.r - a.r) * amount),
        g: Math.round(a.g + (b.g - a.g) * amount),
        b: Math.round(a.b + (b.b - a.b) * amount)
      };
      return `rgb(${c.r}, ${c.g}, ${c.b})`;
    }

    function hexToRgb(hex) {
      const clean = String(hex || "").replace("#", "");
      if (clean.length !== 6) return null;
      const value = Number.parseInt(clean, 16);
      return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }

    function renderApp() {
      applySettings();
      const adminBar = state.user ? renderAdminBar() : "";
      appRoot.innerHTML = `
        ${renderHeader()}
        ${adminBar}
        ${renderMain()}
        ${renderFloatingContact()}
      `;
      renderModal();
      refreshIcons();
      renderSearchResults();
    }

    function renderHeader() {
      const s = state.settings;
      const unread = state.messages.filter((msg) => !msg.read).length;
      return `
        <header class="site-header">
          <div class="header-inner">
            <a class="brand" href="${pageHash("home")}" aria-label="الرئيسية">
              <span class="brand-mark">${s.logoUrl ? `<img src="${escapeAttr(s.logoUrl)}" alt="">` : "H"}</span>
              <span class="brand-copy">
                <span class="brand-title">${escapeHtml(s.title)}</span>
                <span class="brand-tagline">${escapeHtml(s.tagline || "")}</span>
              </span>
            </a>
            <nav class="main-nav ${state.menuOpen ? "open" : ""}" aria-label="التنقل الرئيسي">
              ${renderNavItems()}
              ${state.user ? `
                <button class="nav-link nav-quick-add" type="button" data-action="quick-add-page" data-parent-id="" aria-label="إضافة تاب">
                  <i data-lucide="plus"></i>
                </button>
              ` : ""}
              ${state.user ? `
                <a class="nav-link ${state.currentRoute === "messages" ? "active" : ""}" href="#messages">
                  <i data-lucide="mail"></i>
                  الرسايل
                  ${unread ? `<span class="badge">${unread}</span>` : ""}
                </a>
                <a class="nav-link ${state.currentRoute === "platform" ? "active" : ""}" href="#platform">
                  <i data-lucide="settings"></i>
                  ايديت المنصة
                </a>
              ` : ""}
            </nav>
            <div class="header-tools">
              <button class="icon-btn mobile-menu-btn" type="button" data-action="toggle-menu" aria-label="فتح القائمة">
                <i data-lucide="menu"></i>
              </button>
              <div class="search-wrap">
                <i class="search-icon" data-lucide="search"></i>
                <input class="search-input" id="globalSearch" type="search" placeholder="بحث" value="${escapeAttr(state.searchQuery)}" autocomplete="off" />
                <div id="searchResults" class="search-results"></div>
              </div>
              ${state.user ? `
                <button class="tool-btn secondary" type="button" data-action="logout">
                  <i data-lucide="log-out"></i>
                  <span class="btn-text">خروج</span>
                </button>
              ` : `
                <button class="tool-btn login-icon-btn" type="button" data-action="open-login" title="تسجيل الدخول" aria-label="تسجيل الدخول">
                  <i data-lucide="lock-keyhole"></i>
                  <span class="btn-text">تسجيل الدخول</span>
                </button>
              `}
            </div>
          </div>
        </header>
      `;
    }

    function renderNavItems() {
      return topLevelPages().map((page) => {
        const children = childPages(page.id);
        const active = getCurrentPageId() === page.id || children.some((child) => child.id === getCurrentPageId());
        const href = page.id === "contact" ? "#contact" : pageHash(page.id);
        const showSubnav = children.length || state.user;
        const pinned = state.pinnedSubnavId === page.id;
        const canDrag = Boolean(state.user);
        return `
          <div class="nav-item ${pinned ? "subnav-pinned" : ""}"
            ${canDrag ? `draggable="true" data-drag-kind="main-tab" data-page-id="${escapeAttr(page.id)}" data-parent-id=""` : ""}>
            <span class="nav-tab-wrap">
              <a class="nav-link ${active ? "active" : ""}" href="${href}" ${showSubnav ? `data-action="toggle-subnav" data-page-id="${escapeAttr(page.id)}" aria-expanded="${pinned ? "true" : "false"}"` : ""}>
                ${page.id === "home" ? `<i data-lucide="home"></i>` : ""}
                ${escapeHtml(page.title)}
                ${showSubnav ? `<i data-lucide="chevron-down"></i>` : ""}
              </a>
              ${state.user && page.id !== "contact" ? `
                <button class="nav-edit-mini" type="button" data-action="open-page-editor" data-page-id="${escapeAttr(page.id)}" aria-label="تعديل اسم التاب">
                  <i data-lucide="edit-3"></i>
                </button>
              ` : ""}
              ${state.user && canDeletePage(page.id) ? `
                <button class="nav-delete-mini" type="button" data-action="delete-page" data-page-id="${escapeAttr(page.id)}" aria-label="حذف التاب">
                  <i data-lucide="trash-2"></i>
                </button>
              ` : ""}
            </span>
            ${showSubnav ? `
              <div class="subnav">
                ${children.map((child) => `
                  <div class="subnav-row" ${state.user ? `draggable="true" data-drag-kind="sub-tab" data-page-id="${escapeAttr(child.id)}" data-parent-id="${escapeAttr(page.id)}"` : ""}>
                    <a href="${pageHash(child.id)}">${escapeHtml(child.title)}</a>
                    ${state.user ? `
                      <button class="subnav-edit-mini" type="button" data-action="open-page-editor" data-page-id="${escapeAttr(child.id)}" aria-label="تعديل اسم التاب الفرعي">
                        <i data-lucide="edit-3"></i>
                      </button>
                    ` : ""}
                    ${state.user && canDeletePage(child.id) ? `
                      <button class="subnav-delete-mini" type="button" data-action="delete-page" data-page-id="${escapeAttr(child.id)}" aria-label="حذف التاب الفرعي">
                        <i data-lucide="trash-2"></i>
                      </button>
                    ` : ""}
                  </div>
                `).join("")}
                ${state.user && page.id !== "contact" ? `
                  <button class="subnav-add" type="button" data-action="quick-add-page" data-parent-id="${escapeAttr(page.id)}" aria-label="إضافة تاب فرعي">
                    <i data-lucide="plus"></i>
                  </button>
                ` : ""}
              </div>
            ` : ""}
          </div>
        `;
      }).join("");
    }

    function renderAdminBar() {
      const unread = state.messages.filter((msg) => !msg.read).length;
      return `
        <div class="admin-toolbar">
          <div class="admin-toolbar-inner">
            <div class="admin-tabs">
              <a class="admin-pill ${state.currentRoute === "messages" ? "active" : ""}" href="#messages">
                <i data-lucide="mail"></i>
                الرسايل
                ${unread ? `<span class="badge">${unread}</span>` : ""}
              </a>
              <a class="admin-pill ${state.currentRoute === "platform" ? "active" : ""}" href="#platform">
                <i data-lucide="settings"></i>
                ايديت المنصة
              </a>
              ${getCurrentPageId() ? `
                <button class="admin-pill" type="button" data-action="scroll-palette">
                  <i data-lucide="layout-grid"></i>
                  أشكال
                </button>
              ` : ""}
            </div>
            <div class="muted admin-user">${escapeHtml(state.user.email || "Admin")}</div>
          </div>
        </div>
      `;
    }

    function renderMain() {
      if (state.currentRoute === "messages") return state.user ? renderMessagesPage() : renderProtectedPage();
      if (state.currentRoute === "platform") return state.user ? renderPlatformPage() : renderProtectedPage();
      if (state.currentRoute === "contact") return renderContactPage();
      const id = getCurrentPageId() || "home";
      return renderContentPage(id);
    }

    function renderProtectedPage() {
      return `
        <main class="empty-admin">
          <div class="box">
            <h1>الصفحة دي للأدمن فقط</h1>
            <p class="muted">سجل دخولك بالإيميل والباسورد من الزر الموجود في آخر الشمال.</p>
            <button class="tool-btn" type="button" data-action="open-login">
              <i data-lucide="lock-keyhole"></i>
              تسجيل الدخول
            </button>
          </div>
        </main>
      `;
    }

    function renderContentPage(pageId) {
      const requestedId = pageId || "home";
      const page = findPage(requestedId) || (requestedId === "home" ? findPage("home") || state.pages[0] : null);
      if (!page) return `<main class="empty-public"></main>`;
      const sections = Array.isArray(page.sections) ? page.sections : [];
      const visibleSections = state.user ? sections : sections.filter(sectionHasPublicContent);
      if (!visibleSections.length) {
        if (!state.user) return `<main class="empty-public"></main>`;
        return `
          <main>
            <div class="container">
              ${renderSectionPalette(page.id)}
            </div>
          </main>
        `;
      }
      return `
        <main>
          ${state.user ? `<div class="container">${renderSectionPalette(page.id)}</div>` : ""}
          ${visibleSections.map((section) => {
            const originalIndex = sections.indexOf(section);
            return renderSection(section, page.id, originalIndex);
          }).join("")}
        </main>
      `;
    }

    function renderSectionPalette(pageId) {
      return `
        <section class="section-palette" aria-label="إضافة سيكشن">
          <div class="section-palette-grid">
            ${sectionTypes().map((type) => `
              <button class="section-choice" type="button" data-action="quick-add-section" data-page-id="${escapeAttr(pageId)}" data-type="${escapeAttr(type.value)}">
                <i data-lucide="${escapeAttr(type.icon)}"></i>
                <span>${escapeHtml(type.label)}</span>
              </button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderSection(section, pageId, index) {
      const tools = state.user ? renderSectionTools(pageId, index) : "";
      if (section.type === "hero") return renderHeroSection(section, pageId, index, tools);
      if (section.type === "features") return renderFeatureSection(section, pageId, index, tools);
      if (section.type === "cards") return renderCardsSection(section, pageId, index, tools);
      if (section.type === "gallery") return renderGallerySection(section, pageId, index, tools);
      if (section.type === "image") return renderImageSection(section, pageId, index, tools);
      if (section.type === "accordion") return renderAccordionSection(section, pageId, index, tools);
      if (section.type === "reviews") return renderReviewsSection(section, pageId, index, tools);
      if (section.type === "survey") return renderSurveySection(section, pageId, index, tools);
      return renderTextSection(section, pageId, index, tools);
    }

    function renderSectionTools(pageId, index) {
      return `
        <div class="section-admin-tools">
          <button class="icon-btn" type="button" title="تعديل" data-action="open-section-editor" data-page-id="${escapeAttr(pageId)}" data-index="${index}">
            <i data-lucide="edit-3"></i>
          </button>
          <button class="icon-btn" type="button" title="تحريك لأعلى" data-action="move-section" data-page-id="${escapeAttr(pageId)}" data-index="${index}" data-dir="-1">
            <i data-lucide="arrow-up"></i>
          </button>
          <button class="icon-btn" type="button" title="تحريك لأسفل" data-action="move-section" data-page-id="${escapeAttr(pageId)}" data-index="${index}" data-dir="1">
            <i data-lucide="arrow-down"></i>
          </button>
          <button class="icon-btn danger" type="button" title="حذف" data-action="delete-section" data-page-id="${escapeAttr(pageId)}" data-index="${index}">
            <i data-lucide="trash-2"></i>
          </button>
        </div>
      `;
    }

    function renderHeroSection(section, pageId, index, tools) {
      const actionHref = section.actionPageId ? pageHash(section.actionPageId) : "#contact";
      return `
        <section class="hero" data-section="${escapeAttr(section.id || index)}">
          ${tools}
          <div class="container hero-grid">
            <div class="hero-art">
              ${section.imageUrl ? `
                <div class="hero-image"><img src="${escapeAttr(section.imageUrl)}" alt="${escapeAttr(section.title || "")}"></div>
              ` : `
                <div class="visual-print" aria-hidden="true">
                  <div class="print-stack">
                    <span class="print-sheet one"></span>
                    <span class="print-sheet two"></span>
                    <span class="print-sheet three"></span>
                  </div>
                  <span class="stamp">PRINT</span>
                </div>
              `}
              <div class="hero-chip"><i data-lucide="sparkles"></i>أعمالنا</div>
            </div>
            <div class="hero-copy">
              ${section.eyebrow ? `<span class="eyebrow"><i data-lucide="badge-check"></i>${escapeHtml(section.eyebrow)}</span>` : ""}
              <h1>${escapeHtml(section.title || "")}</h1>
              ${section.text ? `<p>${escapeHtml(section.text)}</p>` : ""}
              ${section.note ? `<div class="hero-note">${escapeHtml(section.note)}</div>` : ""}
              <div class="hero-actions">
                <a class="tool-btn" href="${escapeAttr(actionHref)}">
                  <i data-lucide="gallery-horizontal"></i>
                  ${escapeHtml(section.actionText || "تصفح الأعمال")}
                </a>
                <a class="tool-btn accent" href="#contact">
                  <i data-lucide="send"></i>
                  ${escapeHtml(section.secondaryText || "اطلب تواصل")}
                </a>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderFeatureSection(section, pageId, index, tools) {
      const items = visibleSectionItems(section.items);
      return `
        <section class="content-section" data-section="${escapeAttr(section.id || index)}">
          ${tools}
          <div class="container">
            <div class="feature-strip">
              ${items.map((item) => `
                <div class="feature-item">
                  <span class="feature-icon">
                    ${item.imageUrl ? `<img src="${escapeAttr(item.imageUrl)}" alt="">` : `<i data-lucide="check"></i>`}
                  </span>
                  <span>
                    <strong>${escapeHtml(item.title || "")}</strong>
                    <span>${escapeHtml(item.text || "")}</span>
                  </span>
                </div>
              `).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function renderCardsSection(section, pageId, index, tools) {
      const items = visibleSectionItems(section.items);
      return `
        <section class="content-section" data-section="${escapeAttr(section.id || index)}">
          ${tools}
          <div class="container">
            ${renderSectionHeading(section)}
            <div class="card-grid">
              ${items.map((item, itemIndex) => `
                <article class="content-card">
                  <button class="card-media ${item.shape === "square" ? "square" : ""}" type="button" data-action="open-lightbox" data-page-id="${escapeAttr(pageId)}" data-index="${index}" data-item="${itemIndex}">
                    <img src="${escapeAttr(item.coverUrl || item.imageUrl || visual(item.title || "عمل"))}" alt="${escapeAttr(item.title || "")}">
                    ${item.insideUrl ? `<span class="inner-thumb"><img src="${escapeAttr(item.insideUrl)}" alt=""></span>` : ""}
                  </button>
                  <div class="card-body">
                    <h3>${escapeHtml(item.title || "")}</h3>
                    <p>${escapeHtml(item.text || "")}</p>
                    <button class="tool-btn secondary" type="button" data-action="open-lightbox" data-page-id="${escapeAttr(pageId)}" data-index="${index}" data-item="${itemIndex}">
                      <i data-lucide="eye"></i>
                      اعرف أكتر
                    </button>
                  </div>
                </article>
              `).join("")}
              ${state.user ? `
                <button class="add-card-tile" type="button" data-action="add-card-item" data-page-id="${escapeAttr(pageId)}" data-index="${index}" data-after="${items.length - 1}">
                  <i data-lucide="plus"></i>
                  <span>إضافة كارت جنبهم</span>
                </button>
              ` : ""}
            </div>
          </div>
        </section>
      `;
    }

    function renderGallerySection(section, pageId, index, tools) {
      const items = visibleSectionItems(section.items);
      return `
        <section class="content-section" data-section="${escapeAttr(section.id || index)}">
          ${tools}
          <div class="container">
            ${renderSectionHeading(section)}
            <div class="work-grid">
              ${items.map((item, itemIndex) => `
                <button class="work-card ${item.shape === "square" ? "square" : ""}" type="button" data-action="open-lightbox" data-page-id="${escapeAttr(pageId)}" data-index="${index}" data-item="${itemIndex}">
                  <img src="${escapeAttr(item.imageUrl || visual(item.title || "عمل"))}" alt="${escapeAttr(item.title || "")}">
                  <span class="work-card-caption">${escapeHtml(item.title || "")}</span>
                </button>
              `).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function renderImageSection(section, pageId, index, tools) {
      const hasCopy = Boolean((section.title || "").trim() || (section.text || "").trim() || (section.eyebrow || "").trim());
      if (!hasCopy) {
        return `
          <section class="content-section" data-section="${escapeAttr(section.id || index)}">
            ${tools}
            <div class="container">
              <div class="split-media image-only">
                <img src="${escapeAttr(section.imageUrl || visual("صورة"))}" alt="">
              </div>
            </div>
          </section>
        `;
      }
      return `
        <section class="content-section" data-section="${escapeAttr(section.id || index)}">
          ${tools}
          <div class="container">
            <div class="split-layout ${section.layout === "flip" ? "flip" : ""}">
              <div class="split-media">
                <img src="${escapeAttr(section.imageUrl || visual(section.title || "خدمة"))}" alt="${escapeAttr(section.title || "")}">
              </div>
              <div class="split-copy">
                ${section.eyebrow ? `<span class="eyebrow"><i data-lucide="layers"></i> ${escapeHtml(section.eyebrow)}</span>` : ""}
                <h2>${escapeHtml(section.title || "")}</h2>
                <p>${escapeHtml(section.text || "")}</p>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderAccordionSection(section, pageId, index, tools) {
      const items = visibleSectionItems(section.items);
      const activeIndex = Math.min(state.activeAccordion[section.id || `${pageId}-${index}`] || 0, Math.max(items.length - 1, 0));
      const active = items[activeIndex] || {};
      return `
        <section class="content-section" data-section="${escapeAttr(section.id || index)}">
          ${tools}
          <div class="container">
            ${renderSectionHeading(section)}
            <div class="accordion-list">
              <div class="accordion-tabs">
                ${items.map((item, itemIndex) => `
                  <button class="accordion-tab ${itemIndex === activeIndex ? "active" : ""}" type="button" data-action="accordion" data-key="${escapeAttr(section.id || `${pageId}-${index}`)}" data-index="${itemIndex}">
                    <span>${escapeHtml(item.title || "")}</span>
                    <i data-lucide="chevron-left"></i>
                  </button>
                `).join("")}
              </div>
              <div class="accordion-preview">
                <img src="${escapeAttr(active.imageUrl || visual(active.title || "تفاصيل"))}" alt="${escapeAttr(active.title || "")}">
                <h3>${escapeHtml(active.title || "")}</h3>
                <p>${escapeHtml(active.text || "")}</p>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderTextSection(section, pageId, index, tools) {
      return `
        <section class="content-section" data-section="${escapeAttr(section.id || index)}">
          ${tools}
          <div class="container">
            <div class="text-panel">
              ${section.eyebrow ? `<span class="eyebrow">${escapeHtml(section.eyebrow)}</span>` : ""}
              <h2>${escapeHtml(section.title || "")}</h2>
              <div class="text-body">${escapeHtml(section.text || "").replaceAll("\n", "<br>")}</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderReviewsSection(section, pageId, index, tools) {
      const reviews = state.reviews.slice(0, 8);
      return `
        <section class="content-section" data-section="${escapeAttr(section.id || index)}">
          ${tools}
          <div class="container">
            ${renderSectionHeading(section)}
            <div class="reviews-panel">
              <form class="review-form form-grid" data-form="review">
                <div class="field">
                  <label>اسم العميل</label>
                  <input name="name" required placeholder="اكتب اسمك">
                </div>
                <div class="field">
                  <label>التقييم</label>
                  <div class="rating-row">
                    ${[5, 4, 3, 2, 1].map((value) => `
                      <label class="rating-option">
                        <input type="radio" name="rating" value="${value}" ${value === 5 ? "checked" : ""}>
                        <span><small>${value}</small><i>★</i></span>
                      </label>
                    `).join("")}
                  </div>
                </div>
                <div class="field">
                  <label>الكومنت</label>
                  <textarea name="comment" required placeholder="اكتب رأيك في الشغل"></textarea>
                </div>
                <button class="tool-btn" type="submit">
                  <i data-lucide="star"></i>
                  إرسال التقييم
                </button>
              </form>
              <div class="reviews-list">
                ${reviews.length ? reviews.map(renderReviewCard).join("") : `
                  <div class="review-card">
                    <strong>لسه مفيش تقييمات</strong>
                    <p class="muted" style="margin:0">أول تقييم من عميل هيظهر هنا مباشرة.</p>
                  </div>
                `}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderReviewCard(review) {
      const rating = Math.max(1, Math.min(5, Number(review.rating || 5)));
      return `
        <article class="review-card">
          <div>
            <strong>${escapeHtml(review.name || "عميل")}</strong>
            ${renderStars(rating)}
            <p class="muted" style="margin:8px 0 0">${escapeHtml(review.comment || "")}</p>
          </div>
          ${state.user ? `
            <button class="icon-btn review-delete-btn" type="button" data-action="delete-review" data-id="${escapeAttr(review.id)}" aria-label="حذف التقييم">
              <i data-lucide="trash-2"></i>
            </button>
          ` : ""}
        </article>
      `;
    }

    function renderStars(rating) {
      const safeRating = Math.max(1, Math.min(5, Number(rating || 5)));
      return `
        <span class="stars-display" aria-label="${safeRating} من 5">
          ${[1, 2, 3, 4, 5].map((value) => `<i class="${value <= safeRating ? "lit" : ""}">★</i>`).join("")}
        </span>
      `;
    }

    function renderSurveySection(section, pageId, index, tools) {
      const question = section.title || "سيرفاي";
      const responses = state.surveys.filter((survey) => !survey.question || survey.question === question);
      return `
        <section class="content-section" data-section="${escapeAttr(section.id || index)}">
          ${tools}
          <div class="container">
            ${renderSectionHeading(section)}
            <div class="survey-panel">
              <div class="text-panel">
                <h2>${escapeHtml(question)}</h2>
                <div class="text-body">${escapeHtml(section.text || "اسأل العميل سؤال سريع واحفظ الرد في Firebase.").replaceAll("\n", "<br>")}</div>
                ${state.user ? `
                  <div class="survey-responses">
                    ${responses.length ? responses.map(renderSurveyResponse).join("") : `
                      <div class="review-card">
                        <strong>مفيش ردود سيرفاي</strong>
                        <p class="muted" style="margin:0">أول رد هيظهر هنا للأدمن.</p>
                      </div>
                    `}
                  </div>
                ` : ""}
              </div>
              <form class="survey-form form-grid" data-form="survey">
                <input type="hidden" name="question" value="${escapeAttr(question)}">
                <div class="field">
                  <label>اسم العميل</label>
                  <input name="name" placeholder="اختياري">
                </div>
                <div class="field">
                  <label>التقييم</label>
                  <div class="rating-row">
                    ${[5, 4, 3, 2, 1].map((value) => `
                      <label class="rating-option">
                        <input type="radio" name="rating" value="${value}" ${value === 5 ? "checked" : ""}>
                        <span><small>${value}</small><i>★</i></span>
                      </label>
                    `).join("")}
                  </div>
                </div>
                <div class="field">
                  <label>ملاحظات</label>
                  <textarea name="comment" placeholder="اكتب أي ملاحظة"></textarea>
                </div>
                <button class="tool-btn" type="submit">
                  <i data-lucide="send"></i>
                  إرسال
                </button>
              </form>
            </div>
          </div>
        </section>
      `;
    }

    function renderSurveyResponse(survey) {
      const rating = Math.max(1, Math.min(5, Number(survey.rating || survey.answer || 5)));
      return `
        <article class="survey-response">
          <div>
            <strong>${escapeHtml(survey.name || "عميل")}</strong>
            ${renderStars(rating)}
            ${survey.comment ? `<p class="muted" style="margin:6px 0 0">${escapeHtml(survey.comment)}</p>` : ""}
          </div>
          <button class="icon-btn danger" type="button" data-action="delete-survey" data-id="${escapeAttr(survey.id)}" aria-label="حذف رد السيرفاي">
            <i data-lucide="trash-2"></i>
          </button>
        </article>
      `;
    }

    function renderSectionHeading(section) {
      const title = escapeHtml(section.title || "");
      const text = escapeHtml(section.text || "");
      if (!title && !text) return "";
      return `
        <div class="section-heading">
          ${title ? `<h2>${highlightTitle(title)}</h2><div class="decor"></div>` : ""}
          ${text ? `<p>${text}</p>` : ""}
        </div>
      `;
    }

    function highlightTitle(title) {
      const parts = title.split(" ");
      if (parts.length < 3) return escapeHtml(title);
      const middle = Math.floor(parts.length / 2);
      parts[middle] = `<span class="accent-word">${escapeHtml(parts[middle])}</span>`;
      return parts.map((part, index) => index === middle ? part : escapeHtml(part)).join(" ");
    }

    function renderMessagesPage() {
      const all = state.messages;
      const unread = all.filter((msg) => !msg.read);
      const read = all.filter((msg) => msg.read);
      const list = state.messageFilter === "unread" ? unread : state.messageFilter === "read" ? read : all;
      return `
        <main class="messages-page">
          <div class="container">
            <div class="builder-head">
              <div>
                <h1 style="margin:0;color:var(--primary)">الرسايل</h1>
                <p class="muted" style="margin:6px 0 0">الرسائل بتتحدث لحظيًا من Firestore.</p>
              </div>
              <div class="admin-tabs">
                <button class="admin-pill ${state.messageFilter === "all" ? "active" : ""}" type="button" data-action="message-filter" data-filter="all">الكل ${all.length}</button>
                <button class="admin-pill ${state.messageFilter === "unread" ? "active" : ""}" type="button" data-action="message-filter" data-filter="unread">غير مقروء ${unread.length}</button>
                <button class="admin-pill ${state.messageFilter === "read" ? "active" : ""}" type="button" data-action="message-filter" data-filter="read">مقروء ${read.length}</button>
              </div>
            </div>
            <div class="messages-grid">
              ${list.length ? list.map(renderMessageCard).join("") : `
                <div class="panel" style="text-align:center">
                  <h2>مفيش رسائل هنا</h2>
                  <p class="muted">أول ما عميل يبعت طلب، هيظهر في المكان ده.</p>
                </div>
              `}
            </div>
          </div>
        </main>
      `;
    }

    function renderMessageCard(message) {
      const date = message.createdAt?.toDate ? message.createdAt.toDate().toLocaleString("ar-EG") : "لسه دلوقتي";
      return `
        <article class="message-card ${message.read ? "" : "unread"}">
          <div>
            <h3>${escapeHtml(message.name || "عميل بدون اسم")}</h3>
            <div class="message-meta">
              <span><i data-lucide="phone"></i> ${escapeHtml(message.contact || "بدون وسيلة تواصل")}</span>
              <span><i data-lucide="clock"></i> ${escapeHtml(date)}</span>
              <span>${message.read ? "مقروءة" : "غير مقروءة"}</span>
            </div>
            <p>${escapeHtml(message.body || message.message || "")}</p>
          </div>
          <div class="actions-row" style="margin:0">
            ${message.read ? "" : `
              <button class="tool-btn secondary" type="button" data-action="mark-read" data-id="${escapeAttr(message.id)}">
                <i data-lucide="check"></i>
                مقروء
              </button>
            `}
            <button class="tool-btn danger" type="button" data-action="delete-message" data-id="${escapeAttr(message.id)}">
              <i data-lucide="trash-2"></i>
              حذف
            </button>
          </div>
        </article>
      `;
    }

    function renderPlatformPage() {
      return `
        <main class="editor-shell">
          <div class="container">
            <section class="panel platform-settings-panel">
              <h2>إعدادات المنصة</h2>
              <form class="form-grid" data-form="settings">
                <div class="field">
                  <label for="siteTitle">عنوان الموقع</label>
                  <input id="siteTitle" name="title" value="${escapeAttr(state.settings.title)}" />
                </div>
                <div class="field">
                  <label for="siteTagline">وصف صغير</label>
                  <input id="siteTagline" name="tagline" value="${escapeAttr(state.settings.tagline || "")}" />
                </div>
                <div class="field">
                  <label for="logoUrl">اللوجو</label>

    function renderContactPage() {

    function renderFloatingContact() {
      return `
        <div class="floating-contact ${state.contactOpen ? "open" : ""}">
          <div class="contact-orbit" aria-hidden="${state.contactOpen ? "false" : "true"}">

              <i data-lucide="phone"></i>
            </a>
            <a class="orbit-btn facebook" href="${escapeAttr(state.settings.facebook || defaultSettings.facebook)}" target="_blank" rel="noopener" aria-label="فيسبوك">
              <i data-lucide="facebook"></i>
            </a>
            <a class="orbit-btn message" href="#contact" aria-label="رسالة">
              <i data-lucide="mail"></i>
            </a>
          </div>

            <i data-lucide="${state.contactOpen ? "x" : "message-circle"}"></i>
          </button>
        </div>
      `;
    }

    function renderModal() {
      if (!state.modal) {
        modalRoot.innerHTML = `<div class="modal-backdrop"></div>`;
        return;
      }
      if (state.modal.type === "login" && modalRoot.querySelector("[data-login-modal]")) {
        refreshIcons();
        return;
      }
      const content = state.modal.type === "login" ? renderLoginModal()
        : state.modal.type === "section" ? renderSectionModal()
        : state.modal.type === "page" ? renderPageModal()
        : state.modal.type === "lightbox" ? renderLightboxModal()
        : "";
      modalRoot.innerHTML = `
        <div class="modal-backdrop open" data-action="close-modal">
          ${content}
        </div>
      `;
      refreshIcons();
    }

    function renderLoginModal() {
      return `
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="loginTitle" data-modal-box data-login-modal>
          <div class="modal-head">
            <h2 id="loginTitle">تسجيل دخول الأدمن</h2>
            <button class="icon-btn" type="button" data-action="close-modal" aria-label="إغلاق"><i data-lucide="x"></i></button>
          </div>
          <form class="modal-body form-grid" data-form="login">
            <div class="field">
              <label for="loginEmail">الإيميل</label>
              <input id="loginEmail" name="email" type="email" autocomplete="email" required>
            </div>
            <div class="field">
              <label for="loginPassword">الباسورد</label>
              <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
            </div>
            <div class="actions-row">
              <button class="tool-btn" type="submit">
                <i data-lucide="lock-keyhole"></i>
                دخول
              </button>
              <button class="tool-btn ghost" type="button" data-action="forgot-password">
                <i data-lucide="mail"></i>
                نسيت الباسورد
              </button>
            </div>
          </form>
        </div>
      `;
    }

    function renderSectionModal() {
      const section = state.sectionDraft || createBlankSection();
      const meta = sectionTypeMeta(section.type);
      return `
        <div class="modal wide" role="dialog" aria-modal="true" aria-labelledby="sectionTitle" data-modal-box>
          <div class="modal-head">
            <h2 id="sectionTitle">${state.sectionDraftIndex === null ? "إضافة سيكشن" : "تعديل سيكشن"}</h2>
            <button class="icon-btn" type="button" data-action="close-modal" aria-label="إغلاق"><i data-lucide="x"></i></button>
          </div>
          <form class="modal-body form-grid" data-form="section">
            <div class="two-cols">
              <div class="field">
                <label for="sectionType">نوع السيكشن</label>
                <select id="sectionType" name="type" data-section-field="type">
                  ${sectionTypes().map((type) => `<option value="${type.value}" ${section.type === type.value ? "selected" : ""}>${type.label}</option>`).join("")}
                </select>
              </div>
              <div class="field">
                <label for="sectionLayout">الشكل</label>
                <select id="sectionLayout" name="layout" data-section-field="layout">
                  <option value="normal" ${section.layout !== "flip" ? "selected" : ""}>عادي</option>
                  <option value="flip" ${section.layout === "flip" ? "selected" : ""}>عكس الاتجاه</option>
                </select>
              </div>
            </div>
            ${renderSectionEditorFields(section, meta)}

            <div class="actions-row">
              <button class="tool-btn" type="submit">
                <i data-lucide="save"></i>
                حفظ السيكشن
              </button>
              <button class="tool-btn ghost" type="button" data-action="close-modal">إلغاء</button>
            </div>
          </form>
        </div>
      `;
    }

    function renderSectionEditorFields(section, meta) {
      if (section.type === "text") {
        return `
          <div class="field">
            <label for="sectionTitleInput">العنوان</label>
            <input id="sectionTitleInput" value="${escapeAttr(section.title || "")}" data-section-field="title">
          </div>
          <div class="field">
            <label for="sectionText">النص</label>
            <textarea id="sectionText" data-section-field="text">${escapeHtml(section.text || "")}</textarea>
          </div>
        `;
      }

      if (section.type === "image") {
        return `
          <div class="two-cols">
            <div class="image-preview-card">
              <img id="sectionImagePreview" src="${escapeAttr(section.imageUrl || visual(section.title || "صورة"))}" alt="">
            </div>
            <div class="form-grid">
              <div class="field">
                <label for="sectionImage">الصورة</label>
                <input id="sectionImage" value="${escapeAttr(section.imageUrl || "")}" data-section-field="imageUrl" placeholder="لينك الصورة">
                <input type="file" accept="image/*" data-action="upload-section-image" data-target="imageUrl">
              </div>
              <div class="field">
                <label for="sectionTitleInput">عنوان اختياري</label>
                <input id="sectionTitleInput" value="${escapeAttr(section.title || "")}" data-section-field="title">
              </div>
              <div class="field">
                <label for="sectionText">وصف اختياري</label>
                <textarea id="sectionText" data-section-field="text">${escapeHtml(section.text || "")}</textarea>
              </div>
            </div>
          </div>
        `;
      }

      if (sectionUsesItems(section.type)) {
        return `
          <div class="two-cols">
            <div class="field">
              <label for="sectionTitleInput">عنوان السيكشن</label>
              <input id="sectionTitleInput" value="${escapeAttr(section.title || "")}" data-section-field="title">
            </div>
            <div class="field">
              <label for="sectionText">وصف السيكشن</label>
              <input id="sectionText" value="${escapeAttr(section.text || "")}" data-section-field="text">
            </div>
          </div>
          <div>
            <div class="builder-head">
              <div>
                <h3 style="margin:0">عناصر ${escapeHtml(meta.label)}</h3>
              </div>
              <button class="tool-btn secondary" type="button" data-action="add-draft-item">
                <i data-lucide="plus"></i>
                عنصر
              </button>
            </div>
            <div class="item-editor-list">
              ${ensureItems(section.items).map((item, index) => renderItemEditor(item, index, section.type)).join("")}
            </div>
          </div>
        `;
      }

      if (section.type === "reviews" || section.type === "survey") {
        return `
          <div class="field">
            <label for="sectionTitleInput">العنوان</label>
            <input id="sectionTitleInput" value="${escapeAttr(section.title || "")}" data-section-field="title">
          </div>
          <div class="field">
            <label for="sectionText">النص</label>
            <textarea id="sectionText" data-section-field="text">${escapeHtml(section.text || "")}</textarea>
          </div>
        `;
      }

      return `
        <div class="two-cols">
          <div class="field">
            <label for="sectionTitleInput">العنوان</label>
            <input id="sectionTitleInput" value="${escapeAttr(section.title || "")}" data-section-field="title">
          </div>
          <div class="field">
            <label for="sectionEyebrow">عنوان صغير</label>
            <input id="sectionEyebrow" value="${escapeAttr(section.eyebrow || "")}" data-section-field="eyebrow">
          </div>
        </div>
        <div class="field">
          <label for="sectionText">الوصف</label>
          <textarea id="sectionText" data-section-field="text">${escapeHtml(section.text || "")}</textarea>
        </div>
        <div class="two-cols">
          <div class="image-preview-card">
            <img id="sectionImagePreview" src="${escapeAttr(section.imageUrl || visual(section.title || "صورة"))}" alt="">
          </div>
          <div class="field">
            <label for="sectionImage">صورة رئيسية</label>
            <input id="sectionImage" value="${escapeAttr(section.imageUrl || "")}" data-section-field="imageUrl" placeholder="لينك الصورة">
            <input type="file" accept="image/*" data-action="upload-section-image" data-target="imageUrl">
          </div>
        </div>
        ${section.type === "hero" ? `
          <div class="two-cols">
            <div class="field">
              <label for="sectionActionText">نص الزر الأساسي</label>
              <input id="sectionActionText" value="${escapeAttr(section.actionText || "")}" data-section-field="actionText">
            </div>
            <div class="field">
              <label for="sectionActionPage">يفتح صفحة</label>
              <select id="sectionActionPage" data-section-field="actionPageId">
                <option value="">صفحة التواصل</option>
                ${state.pages.map((page) => `<option value="${escapeAttr(page.id)}" ${section.actionPageId === page.id ? "selected" : ""}>${escapeHtml(page.title)}</option>`).join("")}
              </select>
            </div>
          </div>
          <div class="field">
            <label for="sectionNote">ملاحظة زجاجية في الهيرو</label>
            <input id="sectionNote" value="${escapeAttr(section.note || "")}" data-section-field="note">
          </div>
        ` : ""}
      `;
    }

            <div class="field">
              <label for="editPageTitle">اسم التاب</label>
              <input id="editPageTitle" name="title" value="${escapeAttr(page.title || "")}" required>

              </div>

    async function handleSubmit(event) {
      const form = event.target.closest("form");
      if (!form) return;
      const formType = form.dataset.form;
      if (!formType) return;
      event.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      try {
        if (formType === "login") await login(data);
        if (formType === "settings") await saveSettings(data);
        if (formType === "page") await addPage(data);
        if (formType === "edit-page") await editPage(form.dataset.pageId, data);
        if (formType === "section") await saveSectionDraft();
        if (formType === "contact-message") await sendContactMessage(data, form);
        if (formType === "review") await sendReview(data, form);
        if (formType === "survey") await sendSurvey(data, form);
      } catch (error) {
        console.error(error);
        showToast(error.message || "حصل خطأ غير متوقع.");
      }
    }

    function handleClick(event) {
      const modalBox = event.target.closest("[data-modal-box]");
      if (state.pinnedSubnavId && !event.target.closest(".nav-item")) {
        state.pinnedSubnavId = "";
        renderApp();
        return;
      }
      const actionEl = event.target.closest("[data-action]");
      if (!actionEl) return;
      const action = actionEl.dataset.action;
      if (action === "toggle-subnav") {
        if (Date.now() < state.suppressNavClickUntil) {
          event.preventDefault();
          return;
        }
        const pageId = actionEl.dataset.pageId || "";
        state.pinnedSubnavId = state.pinnedSubnavId === pageId ? "" : pageId;
        renderApp();
        return;
      }
      if (action === "close-modal") {
        const isBackdropClick = actionEl.classList.contains("modal-backdrop") && event.target === actionEl;
        const isCloseControl = !actionEl.classList.contains("modal-backdrop");
        if (isBackdropClick || isCloseControl) {
          state.modal = null;
          renderApp();
        }
        return;
      }
      if (action === "toggle-contact") {
        state.contactOpen = !state.contactOpen;
        renderApp();
      }
      if (action === "toggle-menu") {
        state.menuOpen = !state.menuOpen;
        renderApp();
      }
      if (action === "quick-add-page") {
        quickAddPage(actionEl.dataset.parentId || "");
      }
      if (action === "quick-add-section") {
        quickAddSection(actionEl.dataset.pageId, actionEl.dataset.type || "image");
      }
      if (action === "add-card-item") {
        addCardItem(actionEl.dataset.pageId, Number(actionEl.dataset.index), Number(actionEl.dataset.after));
      }
      if (action === "scroll-palette") {
        document.querySelector(".section-palette")?.scrollIntoView({ behavior: "smooth", block: "start" });
      }
      if (action === "open-login") {
        state.modal = { type: "login" };
        renderApp();
      }
      if (action === "forgot-password") {
        forgotPassword();
      }
      if (action === "logout") {
        signOut(auth).then(() => showToast("تم تسجيل الخروج."));
      }
      if (action === "message-filter") {
        state.messageFilter = actionEl.dataset.filter || "all";
        renderApp();
      }
      if (action === "mark-read") {
        markMessageRead(actionEl.dataset.id);
      }
      if (action === "delete-message") {
        deleteMessage(actionEl.dataset.id);
      }
      if (action === "delete-review") {
        deleteReview(actionEl.dataset.id);
      }
      if (action === "delete-survey") {
        deleteSurvey(actionEl.dataset.id);
      }
      if (action === "select-editor-page") {
        state.selectedEditorPageId = actionEl.dataset.pageId;
        renderApp();
      }
      if (action === "open-page-editor") {
        state.modal = { type: "page", pageId: actionEl.dataset.pageId };
        renderApp();
      }
      if (action === "delete-page") {
        deletePage(actionEl.dataset.pageId);
      }
      if (action === "open-section-editor") {
        openSectionEditor(actionEl.dataset.pageId, actionEl.dataset.index === undefined ? null : Number(actionEl.dataset.index));
      }
      if (action === "delete-section") {
        deleteSection(actionEl.dataset.pageId, Number(actionEl.dataset.index));
      }
      if (action === "move-section") {
        moveSection(actionEl.dataset.pageId, Number(actionEl.dataset.index), Number(actionEl.dataset.dir));
      }
      if (action === "add-draft-item") {
        state.sectionDraft.items = ensureItems(state.sectionDraft.items);
        state.sectionDraft.items.push(blankItemForType(state.sectionDraft.type));
        renderApp();
      }
      if (action === "remove-draft-item") {
        state.sectionDraft.items = ensureItems(state.sectionDraft.items).filter((_, index) => index !== Number(actionEl.dataset.index));
        renderApp();
      }
      if (action === "open-lightbox") {
        state.modal = {
          type: "lightbox",
          pageId: actionEl.dataset.pageId,
          sectionIndex: actionEl.dataset.index,
          itemIndex: actionEl.dataset.item
        };
        renderApp();
      }
      if (action === "accordion") {
        state.activeAccordion[actionEl.dataset.key] = Number(actionEl.dataset.index);
        renderApp();
      }
    }

    function handleTabDragStart(event) {
      const dragEl = event.target.closest("[data-drag-kind]");
      if (!state.user || !dragEl) return;
      if (event.target.closest("button") || event.target.closest("input") || event.target.closest("textarea") || event.target.closest("select")) {
        event.preventDefault();
        return;
      }
      const kind = dragEl.dataset.dragKind;
      const pageId = dragEl.dataset.pageId;
      const parentId = dragEl.dataset.parentId || "";
      if (!pageId) return;
      state.tabDrag = { kind, pageId, parentId };
      state.pinnedSubnavId = parentId || pageId;
      dragEl.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", JSON.stringify(state.tabDrag));
    }

    function handleTabDragOver(event) {
      if (!state.user || !state.tabDrag) return;
      const target = getDropTarget(event.target, state.tabDrag.kind);
      if (!target) return;
      const targetParent = target.dataset.parentId || "";
      if (target.dataset.pageId === state.tabDrag.pageId || targetParent !== state.tabDrag.parentId) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      document.querySelectorAll(".drag-over").forEach((item) => item.classList.remove("drag-over"));
      target.classList.add("drag-over");
    }

    function handleTabDragLeave(event) {
      const target = event.target.closest(".drag-over");
      if (target && !target.contains(event.relatedTarget)) {
        target.classList.remove("drag-over");
      }
    }

    async function handleTabDrop(event) {
      if (!state.user || !state.tabDrag) return;
      const target = getDropTarget(event.target, state.tabDrag.kind);
      if (!target) return;
      const targetParent = target.dataset.parentId || "";
      if (target.dataset.pageId === state.tabDrag.pageId || targetParent !== state.tabDrag.parentId) return;
      event.preventDefault();
      const after = shouldPlaceAfterDrop(event, target, state.tabDrag.kind);
      const drag = { ...state.tabDrag };
      handleTabDragEnd();
      try {
        await reorderPageTabs(drag.pageId, target.dataset.pageId, drag.parentId, after);
        showToast("تم حفظ ترتيب التابات.");
      } catch (error) {
        console.error(error);
        showToast(error.message || "مش قادر أحفظ ترتيب التابات.");
      }
    }

    function handleTabDragEnd() {
      document.querySelectorAll(".dragging, .drag-over").forEach((item) => item.classList.remove("dragging", "drag-over"));
      state.tabDrag = null;
      state.suppressNavClickUntil = Date.now() + 250;
    }

    function getDropTarget(target, kind) {
      if (kind === "sub-tab") return target.closest('.subnav-row[data-drag-kind="sub-tab"]');
      return target.closest('.nav-item[data-drag-kind="main-tab"]');
    }

    function shouldPlaceAfterDrop(event, target, kind) {
      const rect = target.getBoundingClientRect();
      const vertical = kind === "sub-tab" || Math.abs(rect.height) > Math.abs(rect.width);
      if (vertical) return event.clientY > rect.top + rect.height / 2;
      const rtl = getComputedStyle(document.body).direction === "rtl";
      return rtl ? event.clientX < rect.left + rect.width / 2 : event.clientX > rect.left + rect.width / 2;
    }

    function handleInput(event) {
      if (event.target.id === "globalSearch") {
        state.searchQuery = event.target.value;
        renderSearchResults();
      }
      if (event.target.dataset.sectionField) {
        const field = event.target.dataset.sectionField;
        state.sectionDraft[field] = event.target.value;
        if (field === "imageUrl") {
          updatePreviewImage("sectionImagePreview", event.target.value, state.sectionDraft.title || "صورة");
        }
        if (field === "type" && !sectionUsesItems(event.target.value)) {
          state.sectionDraft.items = [];
        }
        if (field === "type" && sectionUsesItems(event.target.value) && !ensureItems(state.sectionDraft.items).length) {
          state.sectionDraft.items = [blankItemForType(event.target.value)];
        }
        if (field === "type") renderApp();
      }
      if (event.target.dataset.itemField) {
        const index = Number(event.target.dataset.index);
        state.sectionDraft.items = ensureItems(state.sectionDraft.items);
        state.sectionDraft.items[index] = {
          ...state.sectionDraft.items[index],
          [event.target.dataset.itemField]: event.target.value
        };
        if (["imageUrl", "coverUrl", "insideUrl"].includes(event.target.dataset.itemField)) {
          updatePreviewImage(itemPreviewId(event.target.dataset.itemField, index), event.target.value, state.sectionDraft.items[index]?.title || "عنصر");
        }
      }
    }

    async function handleChange(event) {
      const action = event.target.dataset.action;
      if (!action) return;
      if (action === "upload-setting-image") {
        const targetId = event.target.dataset.target;
        const url = await uploadImage(event.target.files?.[0]);

      if (action === "upload-item-image" || action === "upload-item-field-image") {

        const index = Number(event.target.dataset.index);
        const field = event.target.dataset.field || "imageUrl";
        previewLocalFile(itemPreviewId(field, index), file);
        const url = await uploadImage(file);
        state.sectionDraft.items = ensureItems(state.sectionDraft.items);
        state.sectionDraft.items[index] = { ...state.sectionDraft.items[index], [field]: url };
        if (field === "coverUrl" && !state.sectionDraft.items[index].imageUrl) {
          state.sectionDraft.items[index].imageUrl = url;
        }
        renderApp();
      }
    }

    function friendlyAuthError(error) {
      const code = String(error?.code || "");
      if (code.includes("wrong-password") || code.includes("invalid-credential")) return "الإيميل أو الباسورد غلط.";
      if (code.includes("user-not-found")) return "الإيميل ده مش موجود.";
      if (code.includes("invalid-email")) return "الإيميل مكتوب غلط.";
      if (code.includes("too-many-requests")) return "محاولات كتير. جرب تاني بعد شوية.";
      if (code.includes("network-request-failed")) return "في مشكلة اتصال. راجع النت وجرب تاني.";
      return "حصلت مشكلة في تسجيل الدخول.";

    async function savePageOrderGroup(parentId, orderedPages) {
      requireAdmin();
      const normalizedParent = parentId || "";
      state.pages = state.pages.map((page) => {
        const nextIndex = orderedPages.findIndex((item) => item.id === page.id);
        if (nextIndex === -1) return page;
        return { ...page, parentId: normalizedParent, order: nextIndex };
      });
      renderApp();
      await Promise.all(orderedPages.map((page, index) => setDoc(doc(db, "sitePages", page.id), {
        title: page.title || "تاب",
        slug: page.slug || slugify(page.title || page.id),
        parentId: normalizedParent,
        order: index,
        sections: ensureItems(page.sections),
        updatedAt: serverTimestamp(),
        ...(!page.createdAt ? { createdAt: serverTimestamp() } : {})
      }, { merge: true })));
    }

    async function reorderPageTabs(sourceId, targetId, parentId = "", after = false) {
      requireAdmin();
      const normalizedParent = parentId || "";
      const siblings = state.pages
        .filter((page) => (page.parentId || "") === normalizedParent)
        .sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
      const sourceIndex = siblings.findIndex((page) => page.id === sourceId);
      const targetIndex = siblings.findIndex((page) => page.id === targetId);
      if (sourceIndex === -1 || targetIndex === -1 || sourceIndex === targetIndex) return;
      const [moved] = siblings.splice(sourceIndex, 1);
      const targetIndexAfterRemoval = siblings.findIndex((page) => page.id === targetId);
      siblings.splice(targetIndexAfterRemoval + (after ? 1 : 0), 0, moved);
      await savePageOrderGroup(normalizedParent, siblings);
    }

    async function applyEditedPageOrder(pageId, data) {
      requireAdmin();
      const current = findPage(pageId);
      if (!current) throw new Error("التاب غير موجود.");
      const normalizedParent = data.parentId || "";
      const cleanPage = {
        ...current,
        title: data.title.trim(),
        slug: slugify(data.title),
        parentId: normalizedParent,
        order: Number(data.order || 0),
        sections: ensureItems(current.sections)
      };
      const oldParent = current.parentId || "";
      const affectedParents = [...new Set([oldParent, normalizedParent])];
      state.pages = state.pages.map((page) => page.id === pageId ? cleanPage : page);

      const requestedOrder = Math.max(0, Math.floor(Number(data.order || 0)));
      const newSiblings = state.pages
        .filter((page) => (page.parentId || "") === normalizedParent && page.id !== pageId)
        .sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
      const insertAt = Math.min(requestedOrder, newSiblings.length);
      newSiblings.splice(insertAt, 0, cleanPage);

      const oldSiblings = oldParent !== normalizedParent
        ? state.pages.filter((page) => (page.parentId || "") === oldParent && page.id !== pageId).sort((a, b) => Number(a.order || 0) - Number(b.order || 0))
        : [];

      await Promise.all([
        savePageOrderGroup(normalizedParent, newSiblings),
        ...(oldSiblings.length || affectedParents.includes(oldParent) && oldParent !== normalizedParent ? [savePageOrderGroup(oldParent, oldSiblings)] : [])
      ]);
    }

    async function moveSection(pageId, index, dir) {

      [sections[index], sections[next]] = [sections[next], sections[index]];
      await updateDoc(doc(db, "sitePages", pageId), { sections, updatedAt: serverTimestamp() });
    }
